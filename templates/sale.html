<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Legal Scrutiny Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: "Segoe UI", Arial; background: #eef2f7; margin: 0; }
.header { background: #1e293b; color: white; padding: 15px; text-align: center; font-size: 20px; }
.container { max-width: 1100px; margin: 20px auto; background: white; padding: 25px; border-radius: 10px; }
.section { margin-bottom: 25px; }
.section h2 { border-left: 4px solid #3b82f6; padding-left: 10px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 12px; }
input, select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 100%; }

.doc-card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 10px; background: #f9fafb; }

.add-btn { background: #22c55e; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; }

button[type="submit"] {
    width: 100%;
    padding: 14px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

/* Toggle */
.toggle { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
.switch { position: relative; width: 40px; height: 20px; }
.switch input { display: none; }

.slider {
    position: absolute;
    background: #ccc;
    border-radius: 20px;
    width: 100%;
    height: 100%;
    cursor: pointer;
}

.slider:before {
    content: "";
    position: absolute;
    width: 16px;
    height: 16px;
    left: 2px;
    top: 2px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
}

input:checked + .slider { background: #22c55e; }
input:checked + .slider:before { transform: translateX(20px); }

.hidden { display: none; }
</style>
</head>

<body>

<div class="header">Legal Scrutiny Report Generator</div>

<div class="container">
<form method="POST" action="/generate_sale">

<!-- BASIC -->
<div class="section">
<h2>Basic Details</h2>
<div class="grid">
<input name="DATE" placeholder="Date">
<input name="BRANCH_NAME" placeholder="Branch Name">
<input name="BRANCH_AREA" placeholder="Branch Area">
<input name="APPLICANT_BOLD_CAPS" placeholder="Applicant Name">
<input name="APPLICATION_NO" placeholder="Application No">
</div>
</div>

<!-- PROPERTY -->
<div class="section">
<h2>Property Details</h2>
<div class="grid">
<input name="DOOR_NO" placeholder="Door No">
<input name="PLOT_NO" placeholder="Plot No">
<input name="ASSESSMENT_NO" placeholder="Assessment No">
<input name="EXTENT_YARDS" placeholder="Extent (Sq Yards)">
<input name="SURVEY_NO" placeholder="Survey No">
<input name="ADDRESS" placeholder="Address">
<input name="VILLAGE" placeholder="Village">
<input name="GRAM_PANCHAYAT" placeholder="Gram Panchayat">
<input name="MANDAL" placeholder="Mandal">
<input name="SRO" placeholder="SRO">
<input name="RO" placeholder="RO">
<input name="DISTRICT" placeholder="District">

<input name="EAST_BOUNDARY" placeholder="East Boundary">
<input name="WEST_BOUNDARY" placeholder="West Boundary">
<input name="NORTH_BOUNDARY" placeholder="North Boundary">
<input name="SOUTH_BOUNDARY" placeholder="South Boundary">

<input name="E_W" placeholder="E-W">
<input name="N_S" placeholder="N-S">
<input name="E_W_FEET" placeholder="E-W Feet">
<input name="N_S_FEET" placeholder="N-S Feet">
<input name="EXTENT_FEET" placeholder="Total Sq Ft">
</div>
</div>

<!-- DOCUMENTS -->
<div class="section">
<h2>Documents (Sale / Gift)</h2>
<div id="documents"></div>
<button type="button" class="add-btn" onclick="addDoc()">+ Add Document</button>
</div>

<!-- EXTRA -->
<div class="section">
<h2>Additional Details</h2>
<div class="grid">
<input name="HOUSE_TAX_DATE" placeholder="House Tax Date">
<input name="HOUSE_TAX_RECIPT_NO" placeholder="Receipt No">
<input name="FINANCIAL_YEARS" placeholder="Financial Years">
<input name="HOUSE_TAX_NAME" placeholder="Tax Name">

<input name="EC_DATE" placeholder="EC Date">
<input name="EC_NO" placeholder="EC No">
<input name="TIME" placeholder="Possession From">
</div>

<!-- TOGGLES -->
<div class="toggle">
<label>Electricity Bill</label>
<label class="switch">
<input type="checkbox" name="HAS_ELECTRICITY_BILL" value="true" onchange="toggleElec(this)">
<span class="slider"></span>
</label>
</div>

<div id="elecFields" class="grid hidden">
<input name="ELECTRICITY_BILL_DATE" placeholder="Bill Date">
<input name="SERVICE_NO" placeholder="Service No">
<input name="ELECTRICITY_NAME" placeholder="Name">
</div>

<div class="toggle">
<label>Mortgage</label>
<label class="switch">
<input type="checkbox" name="HAS_MORTGAGE" value="true" onchange="toggleMort(this)">
<span class="slider"></span>
</label>
</div>

<div id="mortFields" class="grid hidden">
<input name="MORTGAGE_DEED_NO" placeholder="Mortgage Deed No">
<input name="MORTGAGE_DEED_DATE" placeholder="Mortgage Date">
<input name="MORTGAGE_COMPANY" placeholder="Company">
</div>

</div>

<button type="submit">Generate Report</button>

</form>
</div>

<script>
function addDoc() {
    let div = document.createElement("div");
    div.className = "doc-card";

    div.innerHTML = `
        <div class="grid">
            <select name="doc_type[]">
                <option value="Sale">Sale</option>
                <option value="Gift">Gift</option>
            </select>

            <input name="doc_number[]" placeholder="Deed No">
            <input name="doc_date[]" placeholder="Date">
            <input name="doc_executant[]" placeholder="Executant">
            <input name="doc_owner[]" placeholder="Owner">
            <input name="doc_relation[]" placeholder="Relation (Gift)">
            <input name="doc_worth[]" placeholder="Amount">
        </div>
    `;

    document.getElementById("documents").appendChild(div);
}

function toggleElec(el) {
    document.getElementById("elecFields").classList.toggle("hidden", !el.checked);
}

function toggleMort(el) {
    document.getElementById("mortFields").classList.toggle("hidden", !el.checked);
}

addDoc();
</script>

</body>
</html>
